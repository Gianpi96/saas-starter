services:
  - type: web
    name: saas-starter-api
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: saas-starter-db
          property: connectionString
      - key: REDIS_URL
        sync: false  # set manually: your Render Redis URL
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "15"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: CORS_ORIGINS
        sync: false  # set to your Vercel URL: https://your-app.vercel.app
      - key: ENVIRONMENT
        value: production

databases:
  - name: saas-starter-db
    databaseName: saas_db
    user: saas_user
    plan: free
    region: oregon
