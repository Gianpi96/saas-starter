name: E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: saas_db_test
          POSTGRES_USER: saas_user
          POSTGRES_PASSWORD: saas_password_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      # ── Backend ──────────────────────────────────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install backend dependencies
        working-directory: ./backend
        run: pip install -r requirements.txt

      - name: Start FastAPI backend
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql+asyncpg://saas_user:saas_password_test@localhost:5432/saas_db_test
          REDIS_URL: redis://localhost:6379/0          # no password in CI
          JWT_SECRET_KEY: ci_test_secret_key_that_is_32_chars_long
          CORS_ORIGINS: http://localhost:3000
          ENVIRONMENT: development
          LOGIN_RATE_LIMIT: "60/minute"               # generous limit in CI
        run: |
          uvicorn main:app --host 0.0.0.0 --port 8000 &
          # Wait until backend is healthy
          for i in $(seq 1 15); do
            curl -sf http://localhost:8000/api/health && echo " ✓ backend up" && break
            echo "Waiting for backend... ($i/15)"
            sleep 2
          done
          curl -f http://localhost:8000/api/health

      - name: Create test user
        env:
          DATABASE_URL: postgresql+asyncpg://saas_user:saas_password_test@localhost:5432/saas_db_test
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET_KEY: ci_test_secret_key_that_is_32_chars_long
          CORS_ORIGINS: http://localhost:3000
          ENVIRONMENT: development
        run: |
          python backend/scripts/create_test_user.py \
            --email "test@example.com" \
            --password "testpassword123"

      # ── Frontend ─────────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: ./frontend
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: ./frontend
        env:
          CI: "true"
          E2E_BASE_URL: http://localhost:3000
          E2E_TEST_EMAIL: test@example.com
          E2E_TEST_PASSWORD: testpassword123
          # Next.js env vars (picked up by webServer: npm run dev)
          NEXTAUTH_SECRET: ci_nextauth_secret_test_value
          NEXTAUTH_URL: http://localhost:3000
          BACKEND_URL: http://localhost:8000
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: npx playwright test --workers=3

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30
